name: "PROD DEPLOY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  cicd:
    uses: ./.github/workflows/cicd.yml
    with:
      environment: dev
      aws-assume-role-arn: "arn:aws:iam::800960611580:role/GithubActions-EncurtadorLinks-ROle"
      aws-region: "us-east-1"
      aws-statefile-s3-bucket: ""
      aws-lock-dynamodb-table: ""
      artifact-bucket: ""
      ssm-param-artifact-key: "/apps/encurtador_links_saas"
