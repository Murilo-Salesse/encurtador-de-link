name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  cicd:
    uses: ./.github/workflows/cicd.yml
    with:
      environment: dev
      aws-assume-role-arn: "arn:aws:iam::800960611580:role/GithubActions-EncurtadorLinks-ROle"
      aws-region: "us-east-1"
      aws-statefile-s3-bucket: "murilo-salesse-sa-east-1-terraform-statefile"
      aws-lock-dynamodb-table: "murilo-salesse-sa-east-1-terraform-lock"
      artifact-bucket: "murilo-salesse-sa-east-1-terraform-statefile"
      ssm-param-artifact-key: "/apps/encurtador_links_saas"